name: Z64 Video

on:
  push:
    paths-ignore:
      - '.{gitattributes,gitignore,travis.yml}'
      - '*.md,appveyor.yml,README'
  pull_request:
    paths-ignore:
      - '.{gitattributes,gitignore,travis.yml}'
      - '*.md,appveyor.yml,README'
  workflow_dispatch:

jobs:

  Linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - cc: GCC
            arch: x64
          - cc: GCC
            arch: x86
          - cc: Clang
            arch: x64
          - cc: Clang
            arch: x86
    name: Linux / ${{ matrix.cc }} ${{ matrix.arch }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Get build dependencies and arrange the environment
        run: |
          git clone --depth 1 https://github.com/mupen64plus/mupen64plus-core.git ../mupen64plus-core
          export PATH="$(pwd)/../mupen64plus-core/.github/workflows/scripts:${PATH}"
          export BUILD_DEPS="libgl1-mesa-dev libglew-dev libglu1-mesa-dev libsdl2-dev libx11-dev"
          ci_install_ubuntu_deps.sh ${{ matrix.arch }} ${{ matrix.cc }}
          if [[ "${{ matrix.arch }}" == "x86" ]]; then ci_get_libglew_i386.sh; fi
      - name: Build and related stuff, backup binaries
        run: |
          ./../mupen64plus-core/.github/workflows/scripts/ci_build.sh ${{ matrix.arch }} ${{ matrix.cc }} makepkg
      - name: Upload artifact
        if: matrix.cc == 'GCC'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PKG_NAME }}
          path: pkg/*.tar.gz

  MSYS2:
    strategy:
      fail-fast: false
      matrix:
        include:
          - cc: GCC
            arch: x64
            cross: x86_64
            env: MINGW64
          - cc: GCC
            arch: x86
            cross: i686
            env: MINGW32
          - cc: GCC
            arch: x64
            cross: ucrt-x86_64
            env: UCRT64
          - cc: Clang
            arch: x64
            cross: clang-x86_64
            env: CLANG64
    name: Windows ${{ matrix.arch }} / MSYS2 ${{ matrix.env }} ${{ matrix.cc }}
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.env }}
          update: true
          install: >-
            git
            libtool
            make
            mingw-w64-${{ matrix.cross }}-toolchain
            mingw-w64-${{ matrix.cross }}-ntldd
            mingw-w64-${{ matrix.cross }}-SDL2
      - name: Get and install special-case dependencies
        run: |
          git clone --depth 1 https://github.com/mupen64plus/mupen64plus-core.git ../mupen64plus-core
          if [[ "${{ matrix.cross }}" != "i686" ]]; then
            pacman --noconfirm --needed -S mingw-w64-${{ matrix.cross }}-glew
          else
            curl -L -O https://gist.githubusercontent.com/Jj0YzL5nvJ/f2575c352329ece1ff869cb6a66f2eca/raw/b9e8790817f7610e597b6e310d26db2b0da2f8a5/get_deprecated_msys2_mingw_deps.sh
            chmod 755 get_deprecated_msys2_mingw_deps.sh
            ./get_deprecated_msys2_mingw_deps.sh mingw32 mingw-w64-i686-glew-2.2.0-3-any.pkg.tar.zst 681552 a5635e43a6e5e839bed111c65df481badd23bc678d3e83e6b2be281cba378266
          fi
      - name: Build and related stuff, backup binaries
        run: |
          ./../mupen64plus-core/.github/workflows/scripts/ci_build.sh ${{ matrix.arch }} ${{ matrix.cc }}
      - name: Backup dependencies, etc...
        run: |
          ./../mupen64plus-core/.github/workflows/scripts/ci_backup_mingw_deps.sh ${{ matrix.env }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PKG_NAME }}
          path: pkg/*

  Nightly-build:
    runs-on: ubuntu-latest
    if: github.ref_name == 'ci-alter32'
    needs: [Linux, MSYS2]
    steps:
      - uses: actions/checkout@v7
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries
      - name: Get some tools
        run: |
          git clone --depth 1 https://github.com/mupen64plus/mupen64plus-core.git ../mupen64plus-core
          sudo apt-get update
          sudo apt-get -y install hashdeep
      - name: Creating new artifacts and update nightly-build
        run: |
          ./../mupen64plus-core/.github/workflows/scripts/ci_nightly_artifacts.sh
      - name: Nightly-build
        if: ${{ env.WORKFLOW_REV == env.CURRENT_REV }}
        uses: ncipollo/release-action@v1
        with:
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: false
          tag: nightly-build
          artifacts: pkg/*
